storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_POSTGRES_USER
      password:
        env: DAGSTER_POSTGRES_PASSWORD
      hostname: postgresql
      db_name:
        env: DAGSTER_POSTGRES_DB
      port: 5432

run_launcher:
  module: dagster_docker
  class: DockerRunLauncher
  config:
    container_kwargs:
      auto_remove: true
    networks:
      - lol_network
    env_vars:
      - DAGSTER_POSTGRES_USER
      - DAGSTER_POSTGRES_PASSWORD
      - DAGSTER_POSTGRES_DB
      - LEAGUEPEDIA_USERNAME
      - LEAGUEPEDIA_PASSWORD
      - S3_BUCKET_NAME
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - SNOWFLAKE_ACCOUNT
      - SNOWFLAKE_USER
      - SNOWFLAKE_PASSWORD
      - SNOWFLAKE_DATABASE
      - SNOWFLAKE_SCHEMA_NAME
      - SNOWFLAKE_WAREHOUSE
      - RIOT_API_KEY
      - SNOWFLAKE_DBT_USER
      - SNOWFLAKE_DBT_PASSWORD
      - SNOWFLAKE_DBT_ROLE
      - DBT_PROFILES_DIR

telemetry:
  enabled: false