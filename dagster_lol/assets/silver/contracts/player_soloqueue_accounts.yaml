dataContractSpecification: 0.9.3
id: urn:datacontract:silver:leaguepedia_player_soloqueue_accounts
info:
  title: Leaguepedia Player Soloqueue Accounts
  version: 1.0.0
  description: Comptes soloqueue normalisés (1 ligne par compte) enrichis avec le PUUID Riot (couche silver).
  owner: pipeline-data

servers:
  production:
    type: snowflake
    account: ${SNOWFLAKE_ACCOUNT}
    database: ${SNOWFLAKE_DATABASE}
    schema: SILVER
    warehouse: ${SNOWFLAKE_WAREHOUSE}
    table: leaguepedia_player_soloqueue_accounts

models:
  leaguepedia_player_soloqueue_accounts:
    description: Un compte soloqueue par ligne, dédupliqué sur (player_overview_page, region, game_name).
    fields:
      player_overview_page:
        type: string
        description: Identifiant Leaguepedia du joueur (FK vers leaguepedia_players.overview_page).
        required: false
        primary: true
      region:
        type: string
        description: Région du serveur soloqueue (ex. EUW, KR, NA).
        required: false
        primary: true
      game_name:
        type: string
        description: Partie game name du Riot ID (ex. "Faker").
        required: false
        primary: true
      tag_line:
        type: string
        description: Partie tag line du Riot ID (ex. "KR1").
        required: false
      full_id:
        type: string
        description: Riot ID complet brut (game_name#tag_line).
        required: false
      puuid:
        type: string
        description: PUUID Riot Games (identifiant unique global cross-région).
        required: false
