x-postgres-env: &postgres-env
  DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
  DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
  DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}

x-superset-env: &superset-env
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
  SUPERSET_POSTGRES_USER: ${SUPERSET_POSTGRES_USER}
  SUPERSET_POSTGRES_PASSWORD: ${SUPERSET_POSTGRES_PASSWORD}
  SUPERSET_POSTGRES_DB: ${SUPERSET_POSTGRES_DB}
  SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
  SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
  SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
  SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
  SNOWFLAKE_USER: ${SNOWFLAKE_USER}
  SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
  SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
  SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}

x-common-env: &common-env
  DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
  DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
  DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
  LEAGUEPEDIA_USERNAME: ${LEAGUEPEDIA_USERNAME}
  LEAGUEPEDIA_PASSWORD: ${LEAGUEPEDIA_PASSWORD}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
  SNOWFLAKE_USER: ${SNOWFLAKE_USER}
  SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
  SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
  SNOWFLAKE_SCHEMA_NAME: ${SNOWFLAKE_SCHEMA_NAME}
  SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
  RIOT_API_KEY: ${RIOT_API_KEY}
  SNOWFLAKE_DBT_USER: ${SNOWFLAKE_DBT_USER}
  SNOWFLAKE_DBT_PASSWORD: ${SNOWFLAKE_DBT_PASSWORD}
  SNOWFLAKE_DBT_ROLE: ${SNOWFLAKE_DBT_ROLE}
  DBT_PROFILES_DIR: /opt/dagster/app/dbt_gold_layer


services:

  # ── Base de données des métadonnées Dagster ────────────────────────────────
  postgresql:
    image: postgres:15
    container_name: lol_postgresql
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lol_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_POSTGRES_USER} -d ${DAGSTER_POSTGRES_DB}"]
      interval: 10s
      timeout: 8s
      retries: 5

  # ── User code (code location gRPC) ────────────────────────────────────────
  user_code:
    build:
      context: .
      dockerfile: Dockerfile_user_code
    container_name: lol_user_code
    image: lol_user_code_image
    restart: always
    environment:
      <<: *common-env 
      DAGSTER_CURRENT_IMAGE: "lol_user_code_image"
    networks:
      - lol_network

  # ── Webserver (Dagit) ──────────────────────────────────────────────────────
  dagster_webserver:
    build:
      context: .
      dockerfile: Dockerfile_dagster
    container_name: lol_webserver
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - lol_network
    depends_on:
      postgresql:
        condition: service_healthy
      user_code:
        condition: service_started

  # ── Daemon (schedules, sensors, run queue) ────────────────────────────────
  dagster_daemon:
    build:
      context: .
      dockerfile: Dockerfile_dagster
    container_name: lol_daemon
    entrypoint:
      - dagster-daemon
      - run
    restart: on-failure
    environment:
      <<: *common-env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - lol_network
    depends_on:
      postgresql:
        condition: service_healthy
      user_code:
        condition: service_started

  # ── Superset Postgres (métadonnées) ───────────────────────────────────────
  superset_postgresql:
    image: postgres:15
    container_name: lol_superset_postgresql
    environment:
      POSTGRES_USER: ${SUPERSET_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SUPERSET_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SUPERSET_POSTGRES_DB}
    volumes:
      - superset_postgres_data:/var/lib/postgresql/data
    networks:
      - lol_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_POSTGRES_USER} -d ${SUPERSET_POSTGRES_DB}"]
      interval: 10s
      timeout: 8s
      retries: 5

  # ── Redis (cache Superset) ─────────────────────────────────────────────────
  superset_redis:
    image: redis:7-alpine
    container_name: lol_superset_redis
    networks:
      - lol_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Superset Init (one-shot) ───────────────────────────────────────────────
  superset_init:
    build:
      context: .
      dockerfile: Dockerfile_superset
    container_name: lol_superset_init
    command: ["bash", "/app/superset_init.sh"]
    environment:
      <<: *superset-env
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/superset_init.sh:/app/superset_init.sh:ro
      - ./superset/snowflake_import.py:/app/snowflake_import.py:ro
    networks:
      - lol_network
    depends_on:
      superset_postgresql:
        condition: service_healthy
      superset_redis:
        condition: service_healthy

  # ── Superset Webserver ─────────────────────────────────────────────────────
  superset_webserver:
    build:
      context: .
      dockerfile: Dockerfile_superset
    container_name: lol_superset_webserver
    command:
      - gunicorn
      - "--bind=0.0.0.0:8088"
      - "--timeout=120"
      - "--workers=2"
      - "--worker-class=gthread"
      - "--threads=10"
      - "superset.app:create_app()"
    ports:
      - "8088:8088"
    environment:
      <<: *superset-env
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home
    networks:
      - lol_network
    depends_on:
      superset_init:
        condition: service_completed_successfully
      superset_postgresql:
        condition: service_healthy
      superset_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  lol_network:
    driver: bridge
    name: lol_network

volumes:
  postgres_data:
  superset_postgres_data:
  superset_home:
